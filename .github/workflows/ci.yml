name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * MON"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
      - name: Install the workflow call library
        run: |
          uv sync --frozen
      - name: Run prek
        run: |
          uv run prek --all-files --show-diff-on-failure
      - name: Run tests
        run: |
          uv run coverage run --source=python_import_style -m pytest tests
      - name: Check test coverage
        run: |
          uv run coverage report --fail-under=100 --show-missing --skip-covered

  test-readme:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
      - name: Extract TOML from README and write prek.toml
        run: |
          python - <<'PY'
          import re, sys
          s = open('README.md', encoding='utf-8').read()
          blocks = re.findall(r'```toml\n(.*?)\n```', s, flags=re.S)
          chosen = None
          for b in blocks:
              if 'my_package' in b:
                  chosen = b
                  break
          if chosen is None:
              print('No toml block found in README.md', file=sys.stderr)
              sys.exit(1)
          content = chosen.replace('my_package', 'python_import_style')
          open('prek.toml', 'w', encoding='utf-8').write(content)
          print('Wrote prek.toml from README.toml block')
          PY
      - uses: j178/prek-action@cbc2f23eb5539cf20d82d1aabd0d0ecbcc56f4e3  # v2.0.2
        with:
          install-only: true
      - name: Run prek
        run: |
          prek --all-files --show-diff-on-failure

  warn:
    runs-on: ubuntu-latest
    if: github.repository == 'dmf-unicatt/pre-commit-python-import-style' && github.ref == 'refs/heads/main' && github.event_name == 'schedule'
    steps:
      - name: Warn if scheduled workflow is about to be disabled
        uses: fem-on-colab/warn-workflow-about-to-be-disabled-action@58c6022d9aeb22accfa8df9bf5b58c3d8867208c  # v1.0.0
        with:
          workflow-filename: ci.yml
          days-elapsed: 50
